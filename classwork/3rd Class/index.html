<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forms In HTML</title>
  <style>
    div {
      width: 300px;
      height: 600px;
      margin: auto;
      border: 3px solid pink;
      padding: 20px;
    }
    form{
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    input {
      padding:10px;
    }
    textarea {
      padding: 20px;
    }
    button {
      padding: 10px;
      color: black;
      background-color: pink;
    }
  </style>
</head>
<body>
  <div>
    <h2>Contact US</h2>
    <form>
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" placeholder="Enter Your Name"/>
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" placeholder="Enter Your Email"/>
      <label for="contactno">Contact No:</label>
      <input type="text" id="contactno" placeholder="Enter Your Contact No"/>
      <!-- <selection>
        <label for="message">Message:</label>
        <option value="1">Web Development</option>
        <option value="2">Mobile Development</option>
        <option value="3">UI/UX Design</option>
      </selection> -->

      <lable for="gender">Gender</lable>

      <label for="gender">
      <input type="radio" id="male" name="gender" value="male">Male</label>
      <label for="gender">
      <input type="radio" id="female" name="gender" value="female">Female</label>
      <label for="message">Message:</label>
      <label for="languages">Languages:</label>
      <label for="language"><input type="checkbox" id="html" name="html"/>HTML</label>
      <label for="language"><input type="checkbox" id="css" name="css"/>CSS</label>
      <label for="language"><input type="checkbox" id="js" name="js"/>JavaScript</label>
      <textarea id="message" name="message" placeholder="Enter Your Message"></textarea>
      <button type="submit">Submit</button>

    </form>
  </div>
  <hr>
</body>
</html>
